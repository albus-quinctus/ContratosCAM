name: Actualizar datos de contratos

on:
  # Ejecutar automáticamente cada lunes a las 6:00 UTC
  schedule:
    - cron: '0 6 * * 1'

  # Permitir ejecución manual desde GitHub
  workflow_dispatch:

# Permisos mínimos a nivel de workflow (principio de mínimo privilegio)
permissions:
  contents: write    # Para auto-commit de datos procesados
  pages: write       # Para deploy a GitHub Pages
  id-token: write    # Para autenticación OIDC de Pages

jobs:
  update-data:
    name: Descargar y procesar contratos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Descargar datos
        run: npm run download

      - name: Parsear datos
        run: npm run parse

      - name: Transformar y limpiar datos
        run: npm run transform

      - name: Importar a base de datos
        run: npm run import-db

      - name: Commit y push de los datos actualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: actualización automática de contratos [skip ci]"
          file_pattern: "data/processed/*.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    name: Desplegar en GitHub Pages
    needs: update-data
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
