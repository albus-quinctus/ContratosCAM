name: Actualizar datos de contratos

on:
  # Ejecutar automáticamente cada lunes a las 6:00 UTC
  schedule:
    - cron: '0 6 * * 1'

  # Permitir ejecución manual desde GitHub
  workflow_dispatch:

# Permisos mínimos a nivel de workflow (principio de mínimo privilegio)
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    name: Descargar y procesar contratos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pipeline ETL completo
        run: npm run etl

      - name: Validar datos generados
        run: npm run validate

      - name: Commit y push de los datos actualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: actualización automática de contratos [skip ci]"
          file_pattern: "data/processed/*.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  deploy:
    name: Desplegar en GitHub Pages
    needs: update-data
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Preparar artefacto para Pages
        run: |
          mkdir -p _site
          cp -r src/web/* _site/
          mkdir -p _site/data/processed
          cp data/processed/*.json _site/data/processed/ 2>/dev/null || echo "Sin datos procesados aún"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
